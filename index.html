<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Meta dasar -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="CV Single-Page dari [Nama Anda] - Junior Frontend Developer dengan keahlian HTML, CSS, dan JavaScript." />
    <meta name="keywords" content="CV, Frontend Developer, HTML, CSS, JavaScript, Portfolio" />
    <meta name="author" content="[Nama Anda]" />
    
    <!-- Open Graph Tags (untuk sharing ke sosial media) -->
    <meta property="og:title" content="CV - [Nama Anda]" />
    <meta property="og:description" content="Lihat CV single-page saya sebagai Junior Frontend Developer." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://domainanda.com/cv" /> <!-- ganti dengan URL nanti -->
    <meta property="og:image" content="https://domainanda.com/og-image.jpg" /> <!-- opsional, ganti nanti -->
    
    <!-- Favicon (ikon di tab browser) -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <!-- Bisa juga pakai SVG atau PNG, contoh: <link rel="icon" href="favicon.png" type="image/png" /> -->
    
    <title>CV - [Nama Anda]</title>
</head>

</html>
