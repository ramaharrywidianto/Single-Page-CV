<!-- File: index.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Meta dasar -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="CV Single-Page dari [Nama Anda] - Junior Frontend Developer dengan keahlian HTML, CSS, dan JavaScript." />
    <meta name="keywords" content="CV, Frontend Developer, HTML, CSS, JavaScript, Portfolio" />
    <meta name="author" content="[Nama Anda]" />
    
    <!-- Open Graph Tags (untuk sharing ke sosial media) -->
    <meta property="og:title" content="CV - [Nama Anda]" />
    <meta property="og:description" content="Lihat CV single-page saya sebagai Junior Frontend Developer." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://domainanda.com/cv" /> <!-- ganti dengan URL nanti -->
    <meta property="og:image" content="https://domainanda.com/og-image.jpg" /> <!-- opsional, ganti nanti -->
    
    <!-- Favicon (ikon di tab browser) -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <!-- Bisa juga pakai SVG atau PNG, contoh: <link rel="icon" href="favicon.png" type="image/png" /> -->
    
    <title>CV - rama harry widianto</title>
</head>
<body>
    <!-- Konten akan diisi pada langkah selanjutnya -->
    <!-- ===== BAGIAN HEADER / IDENTITAS ===== -->
    <header>
        <!-- Nama utama: gunakan h1 untuk hierarki teratas -->
        <h1>John Doe</h1>
        
        <!-- Posisi / jabatan -->
        <p><strong>Junior Frontend Developer</strong></p>
        
        <!-- Informasi kontak: gunakan <address> untuk semantik yang tepat -->
        <address>
            123 Your Street<br />
            Your City, ST 12345<br />
            <a href="tel:+1234567890">(123) 456-7890</a><br />
            <a href="mailto:no_reply@example.com">no_reply@example.com</a>
        </address>
    </header>

    <!-- ===== SISA KONTEN (akan kita isi di langkah berikutnya) ===== -->
    <!-- Bagian Skills, Education, Experience, dan Link akan menyusul -->
</body>
</html>
